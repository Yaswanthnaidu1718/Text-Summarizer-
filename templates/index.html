<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Text Summarizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .summary-box {
            margin-top: 25px;
            padding: 15px;
            background: #f7f7f7;
            border-left: 5px solid #667eea;
            border-radius: 8px;
        }

        .label {
            font-weight: bold;
            margin-top: 15px;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>🧠 AI Text Summarizer</h1>

    <form method="POST" action="/summarize">
        <div class="label">Enter Text:</div>
        <textarea name="text" placeholder="Paste your text here...">{{ text }}</textarea>

        <button type="submit">✨ Summarize</button>
    </form>

    {% if summary %}
        <div class="label">Summary:</div>
        <div class="summary-box">
            {{ summary }}
        </div>
    {% endif %}
</div>

</body>
</html>
